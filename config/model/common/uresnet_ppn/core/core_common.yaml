# UResNet-PPN model configuration
uresnet:
  num_input: 1
  num_classes: 5
  filters: 32
  depth: 5
  reps: 2
  allow_bias: false
  activation:
    name: lrelu
    negative_slope: 0.33
  norm_layer:
    name: batch_norm
    eps: 0.0001
    momentum: 0.01

ppn: {}
  # classify_endpoints varies by config - override in specific configs
