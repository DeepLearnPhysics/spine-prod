# Import the training configuration
include: grappa_inter_edep_w_ka.yaml

# Turn it into a validatio config
override:
  # Single GPU, 100 iterations
  base.world_size: 1
  base.iterations: 100
  base-: [epochs, train]

  # Single GPU batch size, no sampler, test set
  io.loader-: [sampler]
  io.loader.batch_size: 256
  io.loader.dataset.file_list: /sdf/data/neutrino/dune/sim/mpvmpr_v0/test_file_list.txt

  # Full set of weights
  model.weight_path: /sdf/data/neutrino/dune/spine/train/mpvmpr_v0/weights/grappa_inter/edep_balanced_ka/snapshot-*.ckpt
