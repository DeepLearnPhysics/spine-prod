# Lite-output modification for 2x2 configs

__meta__:
  kind: fragment
# Include this after the main config to transform to lite-output mode (no heavy data products)

override:
  # Remove heavy keys from writer
  io.writer.lite: true
  io.writer.keys-:
    - points
    - depositions
    - points_label
    - depositions_label
    - flashes
