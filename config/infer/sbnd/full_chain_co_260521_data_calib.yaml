# SBND full chain configuration, data mode, database-driven calibration
# Revision date: July 6, 2026
#
# Same as full_chain_co_260521_data_nocalib.yaml but with data-specific
# calibration: collection-plane gain for data, per-run electron lifetime
# from the SBND purity measurements, and the YZ (transparency) dQ/dx
# correction map.
#
# The two databases are SPINE-compatible translations of the SBND
# calibration products, produced and validated in
# /exp/sbnd/app/users/sc5303/develop/sbnd_databases_gen2
# (see TRANSLATION_NOTES.md there). Notes:
#   - tpc_elifetime_data.db: 49 IOVs covering runs 18250-18585; values
#     converted from ms to us. Runs BEFORE 18250 will raise an
#     IndexError in SPINE; runs after 18585 use the last IOV.
#   - tpc_yz_correction_data_sbnd.db: collection-plane (plane 2) scale
#     maps, 1 cm x 1 cm, East -> "EE", West -> "EW" (SPINE hardcodes
#     ICARUS TPC labels), single IOV valid from run 0.

include:
  - full_chain_co_260521.yaml

override:
  # Calibration overrides
  # NB: SPINE dot-notation overrides are silently skipped if the PARENT
  # path does not exist in the base config. The MC config has no
  # `transparency` block, so it must be created as a leaf key with a
  # mapping value (not `...transparency.transparency_db: ...`, which
  # would be dropped without warning).
  model.modules.calibration.gain.gain: 45.652
  model.modules.calibration.lifetime-: lifetime
  model.modules.calibration.lifetime.lifetime_db: gen2_databases/tpc_elifetime_data.db
  model.modules.calibration.transparency:
    transparency_db: gen2_databases/tpc_yz_correction_data_sbnd.db

  ### IO overrides ###
  # Use hits sparse event instead of pcluster
  io.loader.dataset.schema.meta.sparse_event: sparse3d_reco
  io.loader.dataset.schema.run_info.sparse_event: sparse3d_reco

  # Remove truth label parsers
  io.loader.dataset.schema-:
    - seg_label
    - ppn_label
    - clust_label
    - clust_label_g4
    - coord_label
    - charge_label
    - graph_label
    - particles
    - neutrinos
    - flashes_xa # not built for data

  # Remove truth label writers
  io.writer.keys-:
    - points_label
    - depositions_label
    - depositions_q_label
    - sources_label
    - points_g4
    - depositions_g4
    - truth_particles
    - truth_interactions
    - flashes_xa # not built for data

  ### Model overrides ###
  # Remove seg_label from network input
  model.network_input-: seg_label
  model.network_input.run_info: run_info

  ### Post-processing overrides ###
  # Set build/post to reco-only mode
  build.mode: reco
  post.direction.run_mode: reco
  post.calo_ke.run_mode: reco
  post.containment.run_mode: reco
  post.time_containment.run_mode: reco
  post.topology_threshold.run_mode: reco
  post.fiducial.run_mode: reco

  # Remove match post-processor (no truth)
  post-:
    - match
    - children_count
    - flash_match

  # Remove irrelevant arguments
  post.containment-: truth_point_mode
  post.topology_threshold-: truth_ke_mode
