# SBND full chain configuration, data mode, first attempt
# Revision date: July 6, 2026
#
# Runs the May 21 2026 collection-only chain on data WITHOUT any
# data-specific calibration overrides: the MC calibration constants
# (gain 47.551 e-/ADC, flat 35 ms lifetime, no transparency map) are
# applied as-is. Use this as a baseline to gauge how badly the MC
# calibration performs on data before switching to the database-driven
# variant (full_chain_co_260521_data_calib.yaml).

include:
  - full_chain_co_260521.yaml

override:
  ### IO overrides ###
  # Use hits sparse event instead of pcluster
  io.loader.dataset.schema.meta.sparse_event: sparse3d_reco
  io.loader.dataset.schema.run_info.sparse_event: sparse3d_reco

  # Remove truth label parsers
  io.loader.dataset.schema-:
    - seg_label
    - ppn_label
    - clust_label
    - clust_label_g4
    - coord_label
    - charge_label
    - graph_label
    - particles
    - neutrinos
    - flashes_xa # not built for data

  # Remove truth label writers
  io.writer.keys-:
    - points_label
    - depositions_label
    - depositions_q_label
    - sources_label
    - points_g4
    - depositions_g4
    - truth_particles
    - truth_interactions
    - flashes_xa # not built for data

  ### Model overrides ###
  # Remove seg_label from network input
  model.network_input-: seg_label
  model.network_input.run_info: run_info

  ### Post-processing overrides ###
  # Set build/post to reco-only mode
  build.mode: reco
  post.direction.run_mode: reco
  post.calo_ke.run_mode: reco
  post.containment.run_mode: reco
  post.time_containment.run_mode: reco
  post.topology_threshold.run_mode: reco
  post.fiducial.run_mode: reco

  # Remove match post-processor (no truth)
  post-:
    - match
    - children_count
    - flash_match

  # Remove irrelevant arguments
  post.containment-: truth_point_mode
  post.topology_threshold-: truth_ke_mode
