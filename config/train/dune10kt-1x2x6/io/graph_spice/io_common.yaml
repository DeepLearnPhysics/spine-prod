# IO common configuration for DUNE10kt-1x2x6 Graph-SPICE training

# IO configuration
io:
  loader:
    minibatch_size: 64
    shuffle: false
    num_workers: 12
    collate_fn: all
    sampler: random_sequence
    dataset:
      name: larcv
      # file_list varies by config - override in specific configs
      # skip_entry_list varies by config - override in specific configs
      schema:
        data:
          parser: sparse3d
          sparse_event: sparse3d_pcluster
        seg_label:
          parser: sparse3d
          sparse_event: sparse3d_pcluster_semantics
        clust_label:
          parser: cluster3d
          cluster_event: cluster3d_pcluster
          particle_event: particle_pcluster
          sparse_semantics_event: sparse3d_pcluster_semantics
          sparse_value_event: sparse3d_pcluster
          add_particle_info: true
          clean_data: true
          break_clusters: true
